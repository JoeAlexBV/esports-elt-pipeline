[
tool.pytest.ini_options
]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v"

[
tool.ruff
]
line-length = 100
target-version = "py312"

[
project
]
name = "esports-elt-pipeline"
version = "0.1.0"
description = "Modern ELT pipeline for PandaScore esports data using Python, Snowflake, dbt, and Airflow"
requires-python = ">=3.12"