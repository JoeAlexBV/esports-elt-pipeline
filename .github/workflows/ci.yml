name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv pytest flake8

      - name: Run flake8
        run: flake8 src tests --max-line-length=100 --extend-ignore=E501

      - name: Run pytest
        run: pytest tests/unit/ -v